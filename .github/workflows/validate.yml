name: Validate Skills

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      CODEX_HOME: ${{ github.workspace }}/.codex-home

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate skill files
        run: bash ./scripts/validate-skills.sh

      - name: Install all skills (Codex)
        run: bash ./scripts/install-all-skills.sh

      - name: Verify installed Codex skills
        run: |
          test -d "$CODEX_HOME/skills/us-stock-analysis"
          test -d "$CODEX_HOME/skills/kr-stock-analysis"

      - name: Install all Claude Code skills
        env:
          CLAUDE_HOME: ${{ github.workspace }}/.claude-home
        run: bash ./scripts/install-all-claude-skills.sh

      - name: Verify installed Claude Code skills
        env:
          CLAUDE_HOME: ${{ github.workspace }}/.claude-home
        run: |
          test -d "$CLAUDE_HOME/skills/us-stock-analysis"
          test -d "$CLAUDE_HOME/skills/kr-stock-analysis"
